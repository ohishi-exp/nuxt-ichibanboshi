name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write       # frontend-ci 内蔵 secret-verify が要求 (ci-workflows#38)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: false
      use_auth_client_dev: true
      # lockfile が ^0.2.55 未満を pin していても manifest に追従して解決する
      # (org caller template 標準。CCoW からは lockfile を再生成できないため)
      install_command: 'npm install'
      post_install_script: 'npx nuxt prepare'
      # single-env (staging = prod): staging / release とも同一 wrangler.toml を
      # live worker (ichibanboshi.ippoan.org) に deploy する。
      deploy_staging_script: 'npm run build && npx wrangler deploy'
      deploy_release_script: 'npm run build && npx wrangler deploy'
      # CF Access client_secret を CF Secrets Store binding 化したため frontend-ci 内蔵の
      # secret-verify が必須化する。GCP cloudsql-sv の CF_ACCESS_CLIENT_SECRET を検証する。
      gcp_secret_verify_project: cloudsql-sv
      gcp_secret_verify_provider: ${{ vars.GCP_WIF_PROVIDER }}
      gcp_secret_verify_sa: ${{ vars.GCP_WIF_SERVICE_ACCOUNT_STAGING }}
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # cross-org (ohishi-exp → ippoan/ci-workflows) は secrets: inherit が
      # 効かないため明示渡し (Refs ippoan/ci-workflows#125)。これで内蔵
      # auto-merge job が App installation token を mint できる
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}
      TAG_RELEASE_PAT: ${{ secrets.TAG_RELEASE_PAT }}
