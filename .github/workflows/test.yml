name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: read
  pull-requests: write
  id-token: write       # frontend-ci 内蔵 secret-verify が要求 (ci-workflows#38)

jobs:
  ci:
    uses: ippoan/ci-workflows/.github/workflows/frontend-ci.yml@main
    with:
      has_tests: false
      use_auth_client_dev: true
      # lockfile が ^0.2.55 未満を pin していても manifest に追従して解決する
      # (org caller template 標準。CCoW からは lockfile を再生成できないため)
      install_command: 'npm install'
      post_install_script: 'npx nuxt prepare'
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # cross-org (ohishi-exp → ippoan/ci-workflows) は secrets: inherit が
      # 効かないため明示渡し (Refs ippoan/ci-workflows#125)。これで内蔵
      # auto-merge job が App installation token を mint できる
      CI_APP_ID: ${{ secrets.CI_APP_ID }}
      CI_APP_PRIVATE_KEY: ${{ secrets.CI_APP_PRIVATE_KEY }}

  # 一時プローブ (Refs ippoan/ci-workflows#125): caller context で org secret が
  # 見えるかを booleans で実測する。値は一切出力しない。確認後に revert する。
  secret-probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe secret visibility (no values printed)
        env:
          HAS_APP_ID: ${{ secrets.CI_APP_ID != '' }}
          HAS_APP_KEY: ${{ secrets.CI_APP_PRIVATE_KEY != '' }}
          HAS_TAG_PAT: ${{ secrets.TAG_RELEASE_PAT != '' }}
        run: |
          echo "CI_APP_ID present:          $HAS_APP_ID"
          echo "CI_APP_PRIVATE_KEY present: $HAS_APP_KEY"
          echo "TAG_RELEASE_PAT present:    $HAS_TAG_PAT"
