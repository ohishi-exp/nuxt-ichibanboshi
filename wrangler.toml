name = "nuxt-ichibanboshi"
account_id = "24b45709d060d957340180e995f0d373"
main = "./.output/server/index.mjs"
compatibility_date = "2025-07-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"

# single-env (staging = prod)。PR を main に上げると CI がこの live worker
# (ichibanboshi.ippoan.org) に deploy する。別 staging worker は持たない。
[[routes]]
pattern = "ichibanboshi.ippoan.org"
custom_domain = true

[vars]
NUXT_SALES_API_BASE = "https://rust-ichiban.mtamaramu.com"
NUXT_PUBLIC_ALC_API_BASE = "https://alc-api.ippoan.org"
NUXT_PUBLIC_AUTH_WORKER_URL = "https://auth.ippoan.org"
# 一番星 (rust-ichiban) 向け CF Access service token を `rust-ichibanboshi-ci-deploy`
# (824a8b3c) に統一 (seikyu / nuxt-ichibanboshi 共通)。client_id は公開識別子なので var。
NUXT_CF_ACCESS_CLIENT_ID = "824a8b3c7042c7040924f38797a832f7.access"

# CF Access client_secret は wrangler secret をやめ、CF Secrets Store binding に移行
# (824a8b3c のペア。GCP cloudsql-sv の CF_ACCESS_CLIENT_SECRET を SoT に sync 済)。
# salesApi.ts が event.context.cloudflare.env.CF_ACCESS_CLIENT_SECRET.get() で読む。
[[secrets_store_secrets]]
binding = "CF_ACCESS_CLIENT_SECRET"
store_id = "bd7bc91a3e5f4111add4acf6cb4b8733"
secret_name = "CF_ACCESS_CLIENT_SECRET"

# 担当者別売上 raw NDJSON.gz の R2 backup (rust-ichiban Phase 2 PR-D 連動、
# Refs ohishi-exp/rust-ichibanboshi#37)。`uriage/{month}/eigyosho-{id}.ndjson.gz` 規約で
# rust の disk 配置 (`/opt/ichibanboshi/raw/{month}/eigyosho-{id}.ndjson.gz`) と 1:1。
# bucket は ohishi-data 復旧用 warm backup 兼、後段 BigQuery / DuckDB 解析の入口。
[[r2_buckets]]
binding = "URIAGE_R2"
bucket_name = "ichibanboshi-uriage"

# rust-ichiban の `/api/uriage/r2/pending` を 15 分おきに polling し、fingerprint
# 変化があった raw NDJSON.gz を R2 (URIAGE_R2) に upload + ack する scheduled task。
# nuxt.config の nitro.scheduledTasks と同式 (両方必須)。
# `*/15 * * * *` = 毎時 00/15/30/45 分。
[triggers]
crons = ["*/15 * * * *"]
